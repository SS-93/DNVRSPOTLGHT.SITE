<!DOCTYPE html><html lang='en'><body style='margin:0;padding:0;font-family:"Inter",sans-serif;background-color:#f9fafb;color:#111827;'><header style='height:60px;background:#ffffff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;'><div style='font-weight:800;font-size:1.2rem;color:#4f46e5;'>DENVER SPOTLIGHT</div><nav style='display:flex;gap:15px;'><div style='width:24px;height:24px;background:#eee;border-radius:4px;'></div><div style='width:24px;height:24px;background:#eee;border-radius:4px;'></div></nav></header><main style='max-width:600px;margin:0 auto;padding:40px 20px;'><section style='text-align:center;margin-bottom:40px;'><h1 style='font-size:2.5rem;font-weight:900;margin-bottom:10px;letter-spacing:-0.025em;'>Get Involved</h1><p style='color:#6b7280;font-size:1.1rem;line-height:1.5;'>Join the movement. Whether you're an artist, a sponsor, or a volunteer, there's a place for you in the Denver Spotlight ecosystem.</p></section><div style='display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:30px;'><div style='background:#ffffff;border:2px solid #4f46e5;padding:15px;border-radius:12px;text-align:center;cursor:pointer;'><div style='font-size:1.5rem;margin-bottom:5px;'>🎤</div><div style='font-size:0.75rem;font-weight:600;color:#4f46e5;'>Perform</div></div><div style='background:#ffffff;border:1px solid #e5e7eb;padding:15px;border-radius:12px;text-align:center;cursor:pointer;'><div style='font-size:1.5rem;margin-bottom:5px;'>🤝</div><div style='font-size:0.75rem;font-weight:600;color:#374151;'>Sponsor</div></div><div style='background:#ffffff;border:1px solid #e5e7eb;padding:15px;border-radius:12px;text-align:center;cursor:pointer;'><div style='font-size:1.5rem;margin-bottom:5px;'>🙋</div><div style='font-size:0.75rem;font-weight:600;color:#374151;'>Volunteer</div></div></div><form style='background:#ffffff;padding:30px;border-radius:16px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);'><div style='margin-bottom:20px;'><label style='display:block;font-size:0.875rem;font-weight:600;margin-bottom:8px;'>Full Name</label><input type='text' placeholder='Jane Doe' style='width:100%;padding:12px;border:1px solid #d1d5db;border-radius:8px;box-sizing:border-box;'></div><div style='margin-bottom:20px;'><label style='display:block;font-size:0.875rem;font-weight:600;margin-bottom:8px;'>Email Address</label><input type='email' placeholder='jane@example.com' style='width:100%;padding:12px;border:1px solid #d1d5db;border-radius:8px;box-sizing:border-box;'></div><div style='margin-bottom:20px;'><label style='display:block;font-size:0.875rem;font-weight:600;margin-bottom:8px;'>Interest Category</label><select style='width:100%;padding:12px;border:1px solid #d1d5db;border-radius:8px;background:#fff;box-sizing:border-box;'><option>Performing Artist</option><option>Sponsorship</option><option>Volunteer</option><option>Media Coverage</option><option>General Inquiry</option></select></div><div style='margin-bottom:20px;'><label style='display:block;font-size:0.875rem;font-weight:600;margin-bottom:8px;'>Portfolio or Website Link</label><input type='text' placeholder='https://...' style='width:100%;padding:12px;border:1px solid #d1d5db;border-radius:8px;box-sizing:border-box;'></div><div style='margin-bottom:20px;'><label style='display:block;font-size:0.875rem;font-weight:600;margin-bottom:8px;'>Tell us more</label><textarea placeholder='Share your vision or specific questions...' style='width:100%;padding:12px;border:1px solid #d1d5db;border-radius:8px;height:100px;box-sizing:border-box;font-family:inherit;'></textarea></div><div style='display:flex;align-items:flex-start;gap:10px;margin-bottom:30px;'><input type='checkbox' style='margin-top:4px;'><label style='font-size:0.875rem;color:#4b5563;line-height:1.4;'>I consent to receiving communications from Denver Spotlight regarding my inquiry and future community updates.</label></div><button type='button' style='width:100%;background:#4f46e5;color:white;padding:16px;border:none;border-radius:8px;font-weight:700;font-size:1rem;cursor:pointer;'>Submit Interest Form</button></form><div style='margin-top:40px;text-align:center;padding-bottom:40px;'><p style='font-size:0.875rem;color:#9ca3af;'>By submitting, you agree to our Terms of Service and Privacy Policy.</p></div></main></body></html>
